services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gezma_agent
      POSTGRES_USER: gezma_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gezma_admin -d gezma_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://gezma_admin:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/gezma_agent
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: 7d
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: GEZMA Agent
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-gezmaagent@gmail.com}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CRON_ENABLED: "true"
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: gezma-uploads
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_REGION: us-east-1
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gezma.rule=Host(`gezma.ezyindustries.my.id`)"
      - "traefik.http.routers.gezma.entrypoints=web"
      - "traefik.http.routers.gezma-secure.rule=Host(`gezma.ezyindustries.my.id`)"
      - "traefik.http.routers.gezma-secure.entrypoints=websecure"
      - "traefik.http.routers.gezma-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.gezma.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-network"

volumes:
  pgdata:
  minio_data:

networks:
  traefik-network:
    external: true
